name: Build Hermes Agent Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, linux, amd64]
    env:
      DOCKER_HOST: tcp://localhost:2375
      IMAGE_REPO: forgejo.lan/kvarnberg/hermes-agent
      PUSH_REPO: 10.43.4.61:3000/kvarnberg/hermes-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          apt-get update
          apt-get install -y --no-install-recommends docker.io ca-certificates git

      - name: Wait for Docker
        run: |
          until docker info >/dev/null 2>&1; do
            sleep 2
          done

      - name: Build and push
        run: |
          set -eu
          tag="main-$(printf '%.9s' "$GITHUB_SHA")"
          image="${IMAGE_REPO}:${tag}"
          push_image="${PUSH_REPO}:${tag}"
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login 10.43.4.61:3000 -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          docker build \
            --build-arg "HERMES_GIT_SHA=${GITHUB_SHA}" \
            -t "${image}" \
            -f Dockerfile \
            .
          docker tag "${image}" "${push_image}"
          docker push "${push_image}"
          echo "Pushed ${image}"
